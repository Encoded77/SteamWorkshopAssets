type: block
title: Compatibility First
body:
  - p: >-
      Every patch is **individually toggleable** and gated on the mod it
      targets. If you do not run the target mod, the patch never loads and
      produces no errors in your log.
  - list:
      - No global XPath operations that could collide with other patch mods.
      - Each target mod is _optional_ — load order is not enforced.
      - Settings menu hides toggles whose requirements are not met.
